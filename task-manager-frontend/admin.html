<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; margin-top: 20px; font-family: sans-serif; }
        .section { width: 100%; max-width: 800px; border: 1px solid black; padding: 20px; margin-bottom: 20px; box-sizing: border-box; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 800px; margin-bottom: 20px; border-bottom: 2px solid black; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid black; padding: 8px; text-align: left; }
        button { padding: 5px 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header-bar">
        <h2>System Admin Dashboard</h2>
        <button onclick="window.location.href='tasks.html'">Back to My Tasks</button>
    </div>

    <div id="errorMsg" style="display:none; border: 1px solid black; padding: 20px; width: 800px;">
        <h3>Access Denied</h3>
        <p>You do not have the required ADMIN privileges to view this page.</p>
    </div>

    <div id="adminContent" style="display:none; width: 100%; display: flex; flex-direction: column; align-items: center;">
        
        <div class="section">
            <h3>All System Users</h3>
            <table>
                <thead><tr><th>ID (UUID)</th><th>Username</th><th>Email</th><th>Action</th></tr></thead>
                <tbody id="usersTable"></tbody>
            </table>
        </div>

        <div class="section">
            <h3>All System Tasks</h3>
            <table>
                <thead><tr><th>Task ID</th><th>Title</th><th>Owner (User ID)</th><th>Action</th></tr></thead>
                <tbody id="tasksTable"></tbody>
            </table>
        </div>

    </div>

    <script>
        const API = 'http://localhost:8080/api';
        const token = localStorage.getItem('jwt_token');
        if (!token) window.location.href = 'index.html';
        const headers = { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token };

        async function loadDashboard() {
            const res = await fetch(`${API}/admin/dashboard`, { headers });
            
            if (res.status === 403) {
                document.getElementById('adminContent').style.display = 'none';
                document.getElementById('errorMsg').style.display = 'block';
                return;
            }
            
            document.getElementById('adminContent').style.display = 'flex';
            const data = await res.json();

            // Load Users
            const uTable = document.getElementById('usersTable');
            uTable.innerHTML = '';
            data.users.forEach(u => {
                uTable.innerHTML += `<tr>
                    <td><small>${u.userId}</small></td>
                    <td>${u.username}</td>
                    <td>${u.email}</td>
                    <td><button onclick="adminDeleteUser('${u.userId}')">Delete User</button></td>
                </tr>`;
            });

            // Load Tasks
            const tTable = document.getElementById('tasksTable');
            tTable.innerHTML = '';
            data.tasks.forEach(t => {
                tTable.innerHTML += `<tr>
                    <td><small>${t.taskId}</small></td>
                    <td>${t.title}</td>
                    <td><small>${t.userId}</small></td>
                    <td><button onclick="adminDeleteTask('${t.taskId}')">Delete Task</button></td>
                </tr>`;
            });
        }

        async function adminDeleteUser(userId) {
            if (confirm("Delete this user AND all their tasks system-wide?")) {
                await fetch(`${API}/admin/delete-user/${userId}`, { method: 'DELETE', headers });
                loadDashboard();
            }
        }

        async function adminDeleteTask(taskId) {
            if (confirm("Delete this task?")) {
                await fetch(`${API}/admin/delete-task/${taskId}`, { method: 'DELETE', headers });
                loadDashboard();
            }
        }

        loadDashboard();
    </script>
</body>
</html>
