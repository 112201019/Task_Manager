<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Dashboard</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; margin-top: 20px; font-family: sans-serif; }
        .section { width: 100%; max-width: 600px; border: 1px solid black; padding: 20px; margin-bottom: 20px; box-sizing: border-box; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 600px; margin-bottom: 20px; border-bottom: 2px solid black; padding-bottom: 10px; }
        input, select, textarea, button { width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box; }
        .task-card { border: 1px solid black; padding: 15px; margin-bottom: 15px; }
        .inline-btn { width: auto; padding: 5px 10px; margin: 0; }
        hr { border-top: 1px dotted black; }
    </style>
</head>
<body>
    <div id="notificationBox" 
    style="
        display: none; 
        position: fixed;    
        top: 20px; 
        right: 20px; 
        padding: 15px 20px; 
        border-radius: 4px; 
        color: white; 
        font-weight: bold; 
        z-index: 1000; 
        box-shadow: 0 4px 6px rgba(0,0,0,0.3); 
        transition: opacity 0.3s;" > </div>
        <!-- for notification box -->
         
    <div class="header-bar">
        <h2>Welcome, <span id="displayUsername" style="color: #444;">User</span>!</h2>
        <div>
            <button id="adminBtn" class="inline-btn" onclick="window.location.href='admin.html'" style="display: none; background-color: #ffd700;">Admin Panel</button>
            <button class="inline-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <!-- PROFILE SETTINGS -->
    <div class="section">
        <h3>Profile Settings</h3>
        <details>
            <summary>Edit Profile & Password</summary>
            <hr>
            <h4>Update Profile</h4>
            <input type="text" id="editUsername" placeholder="New Username">
            <input type="email" id="editEmail" placeholder="New Email">
            <button onclick="updateProfile()">Update Profile</button>
            <hr>
            <h4>Change Password</h4>
            <input type="password" id="oldPass" placeholder="Old Password">
            <input type="password" id="newPass" placeholder="New Password">
            <button onclick="changePassword()">Change Password</button>
            <hr>
            <button onclick="deleteAccount()" style="color: white; background-color: #ff4d4d; border: 2px solid #cc0000;">Delete My Account</button>
        </details>
    </div>

    <!-- TASK FORM -->
    <div class="section">
        <h3 id="formTitle">Add New Task</h3>
        <details>
            <summary id="aboutTask">Add New Task</summary>
            <hr>
            <input type="text" id="title" placeholder="Title">
            <textarea id="desc" placeholder="Description"></textarea>
            <select id="priority">
                <option value="EMERGENCY">Emergency</option>
                <option value="HIGH">High</option>
                <option value="NORMAL" selected>Normal</option>
                <option value="LOW">Low</option>
            </select>
            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
                <input type="checkbox" id="isRecurring" style="width: auto; margin: 0;" onchange="toggleDateInput()">
                <label id="recurLabel" for="isRecurring">Make this a Daily Recurring Task</label>
            </div>
            
            <!-- Toggle inputs cleanly -->
            <input type="datetime-local" id="dueDate">
            <input type="time" id="dueTime" style="display: none;">
            
            <button id="saveBtn" onclick="saveTask()">Save Task</button>
            <button id="cancelBtn" onclick="cancelEdit()" style="display: none; background-color: #444; color: white;">Cancel Edit</button>
            <hr>
        </details>
    </div>

    <!-- TASK LIST -->
    <div class="section">
        <h3>My Tasks</h3>
        <div id="taskList"></div>
    </div>

    <script src="tasks.js"></script>
</body>
</html>
