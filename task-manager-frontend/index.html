<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task Manager - Auth</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .container { border: 1px solid black; padding: 30px; width: 300px; text-align: center; }
        input, button { width: 100%; padding: 8px; margin: 10px 0; box-sizing: border-box; }
        .toggle-link { cursor: pointer; text-decoration: underline; font-size: 0.9em; }
    </style>
    <script src="index.js"></script>
</head>
<body>

    <div class="container" id="loginBox">
        <h2>Sign In</h2>
        <input type="text" id="loginId" placeholder="Email or Username">
        <input type="password" id="loginPass" placeholder="Password">
        <button onclick="login()">Login</button>
        <p class="toggle-link" onclick="toggleView('registerBox')">Need an account? Register</p>
    </div>

    <div class="container" id="registerBox" style="display: none;">
        <h2>Register</h2>
        <input type="text" id="regUsername" placeholder="Username">
        <input type="email" id="regEmail" placeholder="Email">
        <input type="password" id="regPass" placeholder="Password">
        <button onclick="register()">Create Account</button>
        <p class="toggle-link" onclick="toggleView('loginBox')">Have an account? Sign In</p>
    </div>

    <script>
        
    </script>
</body>
</html>
