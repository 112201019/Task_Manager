<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task Manager - Auth</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .container { border: 1px solid black; padding: 30px; width: 300px; text-align: center; }
        input, button { width: 100%; padding: 8px; margin: 10px 0; box-sizing: border-box; }
        .toggle-link { cursor: pointer; text-decoration: underline; font-size: 0.9em; }
    </style>
</head>
<body>

    <div class="container" id="loginBox">
        <h2>Sign In</h2>
        <input type="text" id="loginId" placeholder="Email or Username">
        <input type="password" id="loginPass" placeholder="Password">
        <button onclick="login()">Login</button>
        <p class="toggle-link" onclick="toggleView('registerBox')">Need an account? Register</p>
    </div>

    <div class="container" id="registerBox" style="display: none;">
        <h2>Register</h2>
        <input type="text" id="regUsername" placeholder="Username">
        <input type="email" id="regEmail" placeholder="Email">
        <input type="password" id="regPass" placeholder="Password">
        <button onclick="register()">Create Account</button>
        <p class="toggle-link" onclick="toggleView('loginBox')">Have an account? Sign In</p>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080/api';

        function toggleView(showId) {
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('registerBox').style.display = 'none';
            document.getElementById(showId).style.display = 'block';
        }

        async function login() {
            const payload = {
                loginIdentifier: document.getElementById('loginId').value,
                password: document.getElementById('loginPass').value
            };
            try {
                const res = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                });
                if (!res.ok) return alert("Login failed! Check credentials.");
                const data = await res.json();
                localStorage.setItem('jwt_token', data.token);
                window.location.href = 'tasks.html';
            } catch (e) { alert("Server error!"); }
        }

        async function register() {
            const payload = {
                username: document.getElementById('regUsername').value,
                email: document.getElementById('regEmail').value,
                password: document.getElementById('regPass').value
            };
            try {
                const res = await fetch(`${API_BASE}/users/register`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                });
                if (res.ok) {
                    alert("Registration successful! Please login.");
                    toggleView('loginBox');
                } else {
                    const err = await res.json();
                    alert("Error: " + err.message);
                }
            } catch (e) { alert("Server error!"); }
        }
    </script>
</body>
</html>
