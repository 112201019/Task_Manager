<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager - Login</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #121212;
            color: #FFFFFF;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 12px;
            background-color: #1e1e1e;
            border: 2px solid ;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        h2 {
            color: #FFD700;
            font-size: 2rem;
            margin-bottom: 25px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: #BBBBBB;
            margin-bottom: 8px;
            font-size: 0.9rem;
            text-align: left;
        }
        input {
            width: 100%;
            padding: 12px;
            background-color: #2a2a2a;
            border: 1px solid #444444;
            border-radius: 6px;
            color: #FFFFFF;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .btn-submit {
            width: 100%;
            background-color: #FFD700;
            color: #121212;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        .btn-submit:hover {
            background-color: #FFFFFF;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #888888;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }
        .back-link:hover {
            color: #FFD700;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Account Login</h2>
    <form th:action="@{/login}" method="POST">
        <div class="form-group">
            <label for="username">UserID or Email</label>
            <input type="text" id="userid" name="loginIdentifier" placeholder="Enter your user-ID or email" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn-submit">Sign In</button>
    </form>
    <a th:href="@{/register}" class="back-link">Don't have an account? Register here</a>
    <a th:href="@{/}" class="back-link">← Back to home</a>
</div>

</body>
</html>
