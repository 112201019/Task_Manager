<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager - Register</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #121212; color: #FFFFFF; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .register-card { width: 100%; max-width: 450px; padding: 40px 30px; border-radius: 12px; background-color: #1e1e1e; border: 2px solid #FFD700; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); }
        h2 { color: #FFD700; font-size: 2rem; margin-bottom: 25px; text-align: center; text-transform: uppercase; letter-spacing: 1px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; color: #BBBBBB; margin-bottom: 8px; font-size: 0.9rem; }
        input, select { width: 100%; padding: 12px; background-color: #2a2a2a; border: 1px solid #444444; border-radius: 6px; color: #FFFFFF; font-size: 1rem; transition: border-color 0.3s ease; }
        input:focus, select:focus { outline: none; border-color: #FFD700; }
        select { cursor: pointer; appearance: none; -webkit-appearance: none; -moz-appearance: none; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' fill='%23FFD700'><polygon points='0,0 10,0 5,5'/></svg>"); background-repeat: no-repeat; background-position: right 15px center; padding-right: 40px; }
        .btn-submit { width: 100%; background-color: #FFD700; color: #121212; padding: 12px; font-size: 1rem; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; transition: all 0.3s ease; margin-top: 10px; }
        .btn-submit:hover { background-color: #FFFFFF; box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3); }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #888888; text-decoration: none; font-size: 0.9rem; transition: color 0.3s ease; }
        .back-link:hover { color: #FFD700; }
    </style>
</head>
<body>

<div class="register-card">
    <h2>Create Account</h2>

    <form th:action="@{/register-submit}" method="POST">
        <div class="form-group">
            <label for="username">Username / Full Name</label>
            <input type="text" id="username" name="username" placeholder="Choose a public username" required>
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Create a strong password" required>
        </div>

        <button type="submit" class="btn-submit">Register Account</button>
    </form>

    <a th:href="@{/login}" class="back-link">Already have an account? Login here</a>
</div>

</body>
</html>
